version: '3.9'

services:
  db:
    image: postgres:15-alpine  # Fixed: Added image
    container_name: ${PROJECT_NAME}_db
    restart: always
    environment: 
       POSTGRES_DB: ${DB_NAME}
       POSTGRES_USER: ${DB_USER}
       POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes: 
      - postgres_data:/var/lib/postgresql/data/ # Fixed: changed 'val' to 'var'
    healthcheck: # Added: ensures DB is ready before app starts
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: ${PROJECT_NAME}_app
    # Note: Running migrations in 'command' is okay for dev, 
    # but usually handled via an entrypoint script in prod.
    command: >
        sh -c "python manage.py migrate && 
               gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    volumes: 
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy # Fixed: waits for healthcheck to pass
    environment:
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}

volumes:
  postgres_data: