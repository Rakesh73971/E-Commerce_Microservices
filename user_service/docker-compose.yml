version: '3.9'

services:
  db:
    image: postgres:15-alpine  # Fixed: Added image
    container_name: user_services_db
    restart: always
    environment: 
       POSTGRES_DB: user_services_db
       POSTGRES_USER: user_services_user
       POSTGRES_PASSWORD: user_services_pass
    ports:
      - "5432:5432"
    volumes: 
      - postgres_data:/var/lib/postgresql/data/ # Fixed: changed 'val' to 'var'
    healthcheck: # Added: ensures DB is ready before app starts
      test: ["CMD-SHELL", "pg_isready -U user_services_user -d user_services_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: user_services_app
    # Note: Running migrations in 'command' is okay for dev, 
    # but usually handled via an entrypoint script in prod.
    command: >
        sh -c "python manage.py migrate && 
               gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    volumes: 
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy # Fixed: waits for healthcheck to pass
    environment:
      - DB_NAME=user_services_db
      - DB_USER=user_services_user
      - DB_PASSWORD=user_services_pass
      - DB_HOST=db
      - DB_PORT=5432

volumes:
  postgres_data: